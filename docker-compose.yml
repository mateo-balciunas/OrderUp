services:
  database_postgres:
    image: postgres:17-alpine
    container_name: orderup_db
    ports:
      - ${POSTGRES_PORT}:5432
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    container_name: orderup_api
    restart: unless-stopped
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app #Bind mount the current directory to the container
      - /app/node_modules #Exclude node_modules from the container
    environment:
      NODE_ENV: ${NODE_ENV}
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database_postgres:5432/${POSTGRES_DB}?schema=public"
      PORT: 3000
    depends_on:
      database_postgres:
        condition: service_healthy
    command: sh -c "npm install && npm run build && npm run dev"
volumes:
  postgres_data: